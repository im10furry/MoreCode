name: Rust CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: 代码检查
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust 1.88
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt,clippy

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/git/checkouts
          key: ${{ runner.os }}-cargo-deps-1.88.0-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-deps-1.88.0-
            ${{ runner.os }}-cargo-deps-

      - name: 恢复 target 缓存
        id: check-target-cache
        uses: actions/cache/restore@v5
        with:
          path: target
          key: ${{ runner.os }}-target-check-1.88.0-${{ hashFiles('Cargo.lock', '**/Cargo.toml', 'rust-toolchain.toml', 'clippy.toml', 'rustfmt.toml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-target-check-1.88.0-${{ hashFiles('Cargo.lock', '**/Cargo.toml', 'rust-toolchain.toml', 'clippy.toml', 'rustfmt.toml') }}-
            ${{ runner.os }}-target-check-1.88.0-
            ${{ runner.os }}-target-check-

      - name: 检查代码格式
        run: cargo fmt --check --all

      - name: 运行 Clippy
        run: cargo clippy --workspace --locked -- -D warnings

      - name: 保存 target 缓存
        if: success() && steps.check-target-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: target
          key: ${{ runner.os }}-target-check-1.88.0-${{ hashFiles('Cargo.lock', '**/Cargo.toml', 'rust-toolchain.toml', 'clippy.toml', 'rustfmt.toml') }}-${{ github.sha }}

  test:
    name: 测试 (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: stable
            toolchain: 1.88.0
          - name: nightly
            toolchain: nightly

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: 安装 cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/git/checkouts
          key: ${{ runner.os }}-cargo-deps-${{ matrix.toolchain }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-deps-${{ matrix.toolchain }}-
            ${{ runner.os }}-cargo-deps-

      - name: 恢复 target 缓存
        id: test-target-cache
        uses: actions/cache/restore@v5
        with:
          path: target
          key: ${{ runner.os }}-target-test-${{ matrix.toolchain }}-${{ hashFiles('Cargo.lock', '**/Cargo.toml', 'rust-toolchain.toml', 'clippy.toml', 'rustfmt.toml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-target-test-${{ matrix.toolchain }}-${{ hashFiles('Cargo.lock', '**/Cargo.toml', 'rust-toolchain.toml', 'clippy.toml', 'rustfmt.toml') }}-
            ${{ runner.os }}-target-test-${{ matrix.toolchain }}-
            ${{ runner.os }}-target-test-

      - name: 运行单元测试与集成测试
        run: cargo nextest run --workspace --locked --no-fail-fast

      - name: 运行文档测试
        run: cargo test --workspace --doc --locked

      - name: 保存 target 缓存
        if: success() && steps.test-target-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: target
          key: ${{ runner.os }}-target-test-${{ matrix.toolchain }}-${{ hashFiles('Cargo.lock', '**/Cargo.toml', 'rust-toolchain.toml', 'clippy.toml', 'rustfmt.toml') }}-${{ github.sha }}

  build:
    name: 发布构建 (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: stable
            toolchain: 1.88.0
          - name: nightly
            toolchain: nightly

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/git/checkouts
          key: ${{ runner.os }}-cargo-deps-${{ matrix.toolchain }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-deps-${{ matrix.toolchain }}-
            ${{ runner.os }}-cargo-deps-

      - name: 恢复 target 缓存
        id: build-target-cache
        uses: actions/cache/restore@v5
        with:
          path: target
          key: ${{ runner.os }}-target-build-${{ matrix.toolchain }}-${{ hashFiles('Cargo.lock', '**/Cargo.toml', 'rust-toolchain.toml', 'clippy.toml', 'rustfmt.toml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-target-build-${{ matrix.toolchain }}-${{ hashFiles('Cargo.lock', '**/Cargo.toml', 'rust-toolchain.toml', 'clippy.toml', 'rustfmt.toml') }}-
            ${{ runner.os }}-target-build-${{ matrix.toolchain }}-
            ${{ runner.os }}-target-build-

      - name: 发布构建
        run: cargo build --release --locked

      - name: 保存 target 缓存
        if: success() && steps.build-target-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: target
          key: ${{ runner.os }}-target-build-${{ matrix.toolchain }}-${{ hashFiles('Cargo.lock', '**/Cargo.toml', 'rust-toolchain.toml', 'clippy.toml', 'rustfmt.toml') }}-${{ github.sha }}
