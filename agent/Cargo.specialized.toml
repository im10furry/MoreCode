[package]
name = "agent"
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["MoreCode Contributors"]
rust-version = "1.88"

[lib]
name = "mc_agent"
path = "src/lib_specialized.rs"

[dependencies]
mc-core = { package = "core", path = "../core" }
mc-tool = { package = "tool", path = "../tool" }
async-trait = "0.1.89"
chrono = { version = "0.4.42", features = ["clock", "serde"] }
regex = "1.12.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "2.0.17"
tokio = { version = "1.48.0", features = ["fs", "io-util", "macros", "process", "rt", "rt-multi-thread", "sync", "time"] }
tokio-util = { version = "0.7.16", features = ["rt"] }
toml = "0.8.23"
tracing = "0.1.41"
uuid = { version = "1.18.1", features = ["v4", "serde"] }

[dev-dependencies]
tempfile = "3.23.0"
